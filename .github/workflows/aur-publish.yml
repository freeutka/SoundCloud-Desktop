name: Publish to AUR

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Тег релиза (например 7.5.0). Пусто = взять из release event."
        required: false
        default: ""

jobs:
  publish-to-aur:
    runs-on: ubuntu-latest
    # Используем контейнер Arch Linux, чтобы у нас была команда makepkg
    container: archlinux:base-devel
    steps:
      - name: Install dependencies
        run: pacman -Syu --noconfirm git openssh wget sudo awk

      - name: Setup SSH keys
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -eux
          # ВАЖНО: OpenSSH 10.x резолвит ~ из /etc/passwd (pw_dir), а не из $HOME.
          # В Github Actions с контейнером $HOME=/github/home, но для root
          # pw_dir=/root, поэтому ssh всё ищет в /root/.ssh — кладём туда напрямую.
          SSH_DIR=/root/.ssh
          mkdir -p "$SSH_DIR"
          chmod 700 "$SSH_DIR"

          # Приватный ключ — через env, чтобы не сломать переводы строк/спецсимволы
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > "$SSH_DIR/id_rsa"
          chmod 600 "$SSH_DIR/id_rsa"

          # Тянем host keys по одному типу (comma-list иногда едят криво),
          # stderr — отдельно, чтобы баннеры не попадали в known_hosts.
          : > "$SSH_DIR/known_hosts"
          for kt in rsa ed25519 ecdsa; do
            ssh-keyscan -t "$kt" -T 30 aur.archlinux.org \
              >> "$SSH_DIR/known_hosts" 2>> /tmp/keyscan.err || true
          done
          chmod 644 "$SSH_DIR/known_hosts"

          # Проверяем что есть валидная запись (не только баннеры/комменты)
          if ! ssh-keygen -F aur.archlinux.org -f "$SSH_DIR/known_hosts" >/dev/null; then
            echo "ssh-keyscan не вернул валидных ключей для aur.archlinux.org"
            cat /tmp/keyscan.err || true
            exit 1
          fi

          # SSH-конфиг: абсолютные пути (~ в ssh_config тоже резолвится по pw_dir,
          # но абсолютные пути работают одинаково независимо от того кто читает).
          cat > "$SSH_DIR/config" <<EOF
          Host aur.archlinux.org
            User aur
            IdentityFile $SSH_DIR/id_rsa
            IdentitiesOnly yes
            UserKnownHostsFile $SSH_DIR/known_hosts
            StrictHostKeyChecking yes
          EOF
          chmod 600 "$SSH_DIR/config"

          # Sanity-check соединения
          ssh -T -o BatchMode=yes aur@aur.archlinux.org || true

      - name: Update PKGBUILD and Push
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          # Настраиваем Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # "*" — чтобы покрыть и aur-repo, и момент после chown -R builder
          # (когда git снова используется от root для add/commit/push)
          git config --global --add safe.directory '*'

          # Клонируем наш AUR-пакет
          git clone ssh://aur@aur.archlinux.org/soundcloud-bin.git aur-repo
          cd aur-repo

          # Тег: при ручном запуске берём из inputs.tag, иначе из release event
          TAG="${INPUT_TAG:-$RELEASE_TAG}"
          if [ -z "$TAG" ]; then
            echo "Tag is empty: ни release.tag_name, ни inputs.tag не заданы"
            exit 1
          fi
          NEW_VER="${TAG#v}"
          
          # Скачиваем новые .deb файлы для вычисления хэшей
          URL="https://github.com/zxcloli666/SoundCloud-Desktop/releases/download/${TAG}"
          wget -q "${URL}/soundcloud-desktop_${NEW_VER}_amd64.deb"
          wget -q "${URL}/soundcloud-desktop_${NEW_VER}_arm64.deb"
          
          # Вычисляем SHA256
          SHA_AMD=$(sha256sum soundcloud-desktop_${NEW_VER}_amd64.deb | awk '{print $1}')
          SHA_ARM=$(sha256sum soundcloud-desktop_${NEW_VER}_arm64.deb | awk '{print $1}')
          
          # Удаляем скачанные файлы (они не нужны в Git)
          rm *.deb
          
          # Обновляем значения в PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=${NEW_VER}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s/^sha256sums_x86_64=.*/sha256sums_x86_64=('${SHA_AMD}')/" PKGBUILD
          sed -i "s/^sha256sums_aarch64=.*/sha256sums_aarch64=('${SHA_ARM}')/" PKGBUILD
          
          # makepkg не работает от рута, создаем временного юзера
          useradd -m builder
          chown -R builder:builder .
          
          # Генерируем новый .SRCINFO
          su builder -c "makepkg --printsrcinfo > .SRCINFO"
          
          # Отправляем изменения в AUR
          git add PKGBUILD .SRCINFO
          git commit -m "Auto-update to version ${NEW_VER}"
          git push