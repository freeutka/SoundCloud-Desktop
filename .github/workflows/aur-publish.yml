name: Publish to AUR

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Тег релиза (например 7.5.0). Пусто = взять из release event."
        required: false
        default: ""

jobs:
  publish-to-aur:
    runs-on: ubuntu-latest
    # Используем контейнер Arch Linux, чтобы у нас была команда makepkg
    container: archlinux:base-devel
    steps:
      - name: Install dependencies
        run: pacman -Syu --noconfirm git openssh wget sudo awk

      - name: Setup SSH keys
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -eux
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Приватный ключ — через env, чтобы не сломать переводы строк/спецсимволы
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Тянем host keys по одному типу — некоторые версии ssh-keyscan
          # ломаются на comma-separated списке. stderr пишем отдельно, чтобы
          # баннеры/ошибки не попадали в known_hosts.
          : > ~/.ssh/known_hosts
          for kt in rsa ed25519 ecdsa; do
            ssh-keyscan -t "$kt" -T 30 aur.archlinux.org \
              >> ~/.ssh/known_hosts 2>> /tmp/keyscan.err || true
          done

          echo "--- ssh-keyscan stderr ---"
          cat /tmp/keyscan.err || true
          echo "--- known_hosts ---"
          cat ~/.ssh/known_hosts
          echo "--- end ---"

          # Проверяем что есть РЕАЛЬНАЯ запись для aur.archlinux.org,
          # а не просто непустой файл (могли налиться комменты/ошибки).
          if ! ssh-keygen -F aur.archlinux.org -f ~/.ssh/known_hosts >/dev/null; then
            echo "ssh-keyscan не вернул валидных ключей для aur.archlinux.org"
            echo "Падаем на StrictHostKeyChecking=accept-new (первый коннект примет ключ)"
            STRICT="accept-new"
          else
            STRICT="yes"
          fi
          chmod 644 ~/.ssh/known_hosts

          # SSH-конфиг: явно указываем юзера, ключ и known_hosts для AUR
          cat > ~/.ssh/config <<EOF
          Host aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/id_rsa
            IdentitiesOnly yes
            UserKnownHostsFile ~/.ssh/known_hosts
            StrictHostKeyChecking ${STRICT}
          EOF
          chmod 600 ~/.ssh/config

          # Сразу пробуем подключиться (verbose), чтобы видеть в логе что реально происходит.
          ssh -vT -o BatchMode=yes aur@aur.archlinux.org || true

      - name: Update PKGBUILD and Push
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          # Настраиваем Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory /__w/SoundCloud-Desktop/SoundCloud-Desktop

          # Клонируем наш AUR-пакет
          git clone ssh://aur@aur.archlinux.org/soundcloud-bin.git aur-repo
          cd aur-repo

          # Тег: при ручном запуске берём из inputs.tag, иначе из release event
          TAG="${INPUT_TAG:-$RELEASE_TAG}"
          if [ -z "$TAG" ]; then
            echo "Tag is empty: ни release.tag_name, ни inputs.tag не заданы"
            exit 1
          fi
          NEW_VER="${TAG#v}"
          
          # Скачиваем новые .deb файлы для вычисления хэшей
          URL="https://github.com/zxcloli666/SoundCloud-Desktop/releases/download/${TAG}"
          wget -q "${URL}/soundcloud-desktop_${NEW_VER}_amd64.deb"
          wget -q "${URL}/soundcloud-desktop_${NEW_VER}_arm64.deb"
          
          # Вычисляем SHA256
          SHA_AMD=$(sha256sum soundcloud-desktop_${NEW_VER}_amd64.deb | awk '{print $1}')
          SHA_ARM=$(sha256sum soundcloud-desktop_${NEW_VER}_arm64.deb | awk '{print $1}')
          
          # Удаляем скачанные файлы (они не нужны в Git)
          rm *.deb
          
          # Обновляем значения в PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=${NEW_VER}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s/^sha256sums_x86_64=.*/sha256sums_x86_64=('${SHA_AMD}')/" PKGBUILD
          sed -i "s/^sha256sums_aarch64=.*/sha256sums_aarch64=('${SHA_ARM}')/" PKGBUILD
          
          # makepkg не работает от рута, создаем временного юзера
          useradd -m builder
          chown -R builder:builder .
          
          # Генерируем новый .SRCINFO
          su builder -c "makepkg --printsrcinfo > .SRCINFO"
          
          # Отправляем изменения в AUR
          git add PKGBUILD .SRCINFO
          git commit -m "Auto-update to version ${NEW_VER}"
          git push