name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: dev
          POSTGRES_USER: scd
          POSTGRES_DB: scd
        ports: [ '5432:5432' ]
        options: >-
          --health-cmd "pg_isready -U scd"
          --health-interval 5s --health-timeout 5s --health-retries 12
    env:
      # query_file! макросы проверяются ONLINE против поднятой тест-БД — без .sqlx-кэша.
      DATABASE_URL: postgres://scd:dev@localhost:5432/scd
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: backend -> target
          key: backend

      - name: Apply migrations (sqlx online check)
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          for f in backend/migrations/*.sql; do psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -q -f "$f"; done

      - name: Format check (warn only — does not fail CI)
        working-directory: backend
        run: cargo fmt --check || echo "::warning title=rustfmt::backend code differs from rustfmt — run 'cargo fmt'. Not blocking CI."

      - name: Clippy
        working-directory: backend
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        working-directory: backend
        run: cargo build --release

  # CI читает кэш с main, но НЕ пишет — иначе PR-билды затирают рабочий кэш.
  # cache-to остаётся только в auto-build.yml (release pipeline).
  storage:
    name: Storage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: storage
          build-contexts: |
            tls-common=utils/tls-common
          push: false
          load: true
          tags: soundcloud-desktop-storage:ci
          cache-from: type=gha,scope=storage

  streaming:
    name: Streaming
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: streaming
          build-contexts: |
            tls-common=utils/tls-common
            call=utils/call
            decrypt=utils/decrypt
            decrypt-client=utils/decrypt-client
          push: false
          load: true
          tags: soundcloud-desktop-streaming:ci
          cache-from: type=gha,scope=streaming

  worker:
    name: Worker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check
        working-directory: worker
        run: python -m compileall -q src

      - uses: docker/setup-buildx-action@v3

      # Кэш CPU-воркера лежит в GHCR registry (см. auto-build.yml).
      # Логин нужен для pull cache-образа; для PR из форков шаг тихо упадёт —
      # билд продолжится без кэша (allow-failure через continue-on-error).
      - name: Login to GHCR
        if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: repo
        run: echo "owner=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: worker
          push: false
          load: true
          tags: soundcloud-desktop-worker:ci
          cache-from: type=registry,ref=ghcr.io/${{ steps.repo.outputs.owner }}/cache/scd-worker:cpu

  desktop:
    if: "!contains(github.event.head_commit.message, '!release')"
    name: Desktop
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
            job_name: linux
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            job_name: macos
          - platform: windows-latest
            args: ""
            job_name: windows
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev

      - name: Install dependencies (macos only)
        if: matrix.platform == 'macos-latest'
        run: brew install autoconf automake libtool

      - name: Set cross-compilation environment for macOS x86_64
        if: matrix.job_name == 'macos-amd64'
        run: |
          echo "CFLAGS=-arch x86_64" >> $GITHUB_ENV
          echo "CXXFLAGS=-arch x86_64" >> $GITHUB_ENV
          echo "LDFLAGS=-arch x86_64" >> $GITHUB_ENV
          echo "CC_x86_64_apple_darwin=clang -arch x86_64" >> $GITHUB_ENV
          echo "CXX_x86_64_apple_darwin=clang++ -arch x86_64" >> $GITHUB_ENV
          echo "CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER=clang" >> $GITHUB_ENV
          echo "MACOSX_DEPLOYMENT_TARGET=10.13" >> $GITHUB_ENV

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target
          key: ${{ matrix.job_name }}

      - name: Install frontend dependencies
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: desktop
          args: ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-${{ matrix.job_name }}
          retention-days: 3
          path: |
            desktop/src-tauri/target/**/release/bundle/deb/*.deb
            desktop/src-tauri/target/**/release/bundle/rpm/*.rpm
            desktop/src-tauri/target/**/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/**/release/bundle/nsis/*.exe
            desktop/src-tauri/target/**/release/bundle/msi/*.msi
            desktop/src-tauri/target/**/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/**/release/bundle/macos/*.tar.gz

  flatpak:
    if: "!contains(github.event.head_commit.message, '!release')"
    name: Flatpak
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install flatpak-builder-tools
        run: |
          git clone --depth=1 https://github.com/flatpak/flatpak-builder-tools.git /tmp/fbt
          pip3 install --root-user-action=ignore --break-system-packages --prefix=/app tomlkit
          pip3 install --root-user-action=ignore --break-system-packages --prefix=/app /tmp/fbt/node

      - name: Generate offline sources
        run: |
          cd desktop && npm install --package-lock-only --legacy-peer-deps && cd ..
          flatpak-node-generator npm desktop/package-lock.json -o .github/flatpak/node-sources.json
          python3 /tmp/fbt/cargo/flatpak-cargo-generator.py desktop/src-tauri/Cargo.lock -o .github/flatpak/cargo-sources.json

      - name: Fetch Flathub shared-modules
        run: git clone --depth=1 https://github.com/flathub/shared-modules.git .github/flatpak/shared-modules

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: .github/flatpak/io.github.zxcloli666.SoundcloudDesktop.yml
          bundle: soundcloud-desktop.flatpak

      - name: Upload Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: ci-flatpak
          retention-days: 3
          path: soundcloud-desktop.flatpak

  prod-guard:
    name: Prod / Guard PAT
    runs-on: ubuntu-latest
    outputs:
      ok: ${{ steps.c.outputs.ok }}
    steps:
      - id: c
        env:
          PAT: ${{ secrets.INTERNAL_PAT }}
        run: |
          if [ -n "$PAT" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::INTERNAL_PAT not set — prod jobs skipped"
          fi

  prod-rust:
    name: Prod / Rust (real call)
    needs: prod-guard
    if: needs.prod-guard.outputs.ok == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: dev
          POSTGRES_USER: scd
          POSTGRES_DB: scd
        ports: [ '5432:5432' ]
        options: >-
          --health-cmd "pg_isready -U scd"
          --health-interval 5s --health-timeout 5s --health-retries 12
    env:
      DATABASE_URL: postgres://scd:dev@localhost:5432/scd
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/SoundCloud-Desktop-Internal
          token: ${{ secrets.INTERNAL_PAT }}
          path: _internal

      - name: Replace mock utils/call + utils/decrypt* with real
        run: |
          rm -rf utils/call utils/decrypt utils/decrypt-client
          cp -r _internal/call ./utils/call
          cp -r _internal/decrypt ./utils/decrypt
          cp -r _internal/decrypt-client ./utils/decrypt-client

      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get install -y --no-install-recommends protobuf-compiler

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            backend -> target
            streaming -> target
            utils/call -> target
          key: prod-rust

      - name: Apply migrations (sqlx online check)
        run: |
          sudo apt-get install -y --no-install-recommends postgresql-client
          for f in backend/migrations/*.sql; do psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -q -f "$f"; done

      - run: cargo build --release --manifest-path backend/Cargo.toml
      - run: cargo build --release --manifest-path streaming/Cargo.toml
      - run: cargo build --release --manifest-path utils/call/server/Cargo.toml

  prod-desktop:
    name: Prod / Desktop (real call)
    needs: prod-guard
    if: needs.prod-guard.outputs.ok == 'true' && !contains(github.event.head_commit.message, '!release')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
            slug: linux
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            slug: macos
          - platform: windows-latest
            args: ""
            slug: windows
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/SoundCloud-Desktop-Internal
          token: ${{ secrets.INTERNAL_PAT }}
          path: _internal

      - name: Replace mock utils/call + utils/decrypt-client with real (unix)
        if: runner.os != 'Windows'
        run: |
          rm -rf utils/call utils/decrypt-client
          cp -r _internal/call ./utils/call
          cp -r _internal/decrypt-client ./utils/decrypt-client
      - name: Replace mock utils/call + utils/decrypt-client with real (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force utils/call
          Remove-Item -Recurse -Force utils/decrypt-client
          Copy-Item -Recurse _internal/call ./utils/call
          Copy-Item -Recurse _internal/decrypt-client ./utils/decrypt-client

      - if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev protobuf-compiler
      - if: matrix.platform == 'macos-latest'
        run: brew install autoconf automake libtool protobuf
      - if: matrix.platform == 'windows-latest'
        run: choco install protoc -y --no-progress

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target
          key: prod-desktop-${{ matrix.slug }}

      - working-directory: desktop
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        with:
          projectPath: desktop
          args: ${{ matrix.args }}

      - uses: actions/upload-artifact@v4
        with:
          name: prod-${{ matrix.slug }}
          retention-days: 3
          path: |
            desktop/src-tauri/target/**/release/bundle/deb/*.deb
            desktop/src-tauri/target/**/release/bundle/rpm/*.rpm
            desktop/src-tauri/target/**/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/**/release/bundle/nsis/*.exe
            desktop/src-tauri/target/**/release/bundle/msi/*.msi
            desktop/src-tauri/target/**/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/**/release/bundle/macos/*.tar.gz
